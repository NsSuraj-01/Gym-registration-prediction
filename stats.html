<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Medical Data Form</title>
  <!-- Bootstrap CSS -->
  <link href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <!-- Header with Logo -->
<nav class="navbar navbar-expand-lg navbar-light bg-light">
    <a class="navbar-brand" href="#">
      <!-- Replace 'your-logo.png' with the path to your actual logo file -->
      <img src="/images/2.jpeg" width="30" height="30" class="d-inline-block align-top" alt="Your Logo">
    </a>
  </nav>

<div class="container mt-3">
  <h2>Medical Data Form</h2>
  <form>
    <!-- Patient Information -->
    <div class="form-group">
      <label for="patientName">Patient Name:</label>
      <input type="text" class="form-control" id="patientName" placeholder="Enter patient name">
    </div>

    <div class="form-group">
      <label for="dob">Date of Birth:</label>
      <input type="date" class="form-control" id="dob">
    </div>

    <div class="form-group">
      <label for="gender">Gender:</label>
      <select class="form-control" id="gender">
        <option value="male">Male</option>
        <option value="female">Female</option>
        <option value="other">Other</option>
      </select>
    </div>

    <!-- Medical Information -->
    <div class="form-group">
      <label for="diagnosis">Diagnosis:</label>
      <textarea class="form-control" id="diagnosis" rows="3" placeholder="Enter diagnosis"></textarea>
    </div>

    <div class="form-group">
      <label for="medications">Medications:</label>
      <input type="text" class="form-control" id="medications" placeholder="Enter medications">
    </div>

    <div class="form-group">
      <label for="allergies">Allergies:</label>
      <input type="text" class="form-control" id="allergies" placeholder="Enter allergies">
    </div>

    <!-- Submit Button -->
    <button type="submit" class="btn btn-primary">Submit</button>
  </form>
</div>

<!-- Bootstrap JS and Popper.js -->
<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.10.2/dist/umd/popper.min.js"></script>
